# Detekt 配置文件 - 音乐水印相框项目
# 使用 MiniMax M2.7 重构后的代码审核规则

formatting:
  active: true
  autoCorrect: true
  Indentation:
    active: true
    indentSize: 4
  MaximumLineLength:
    active: true
    maxLineLength: 140
  Filename:
    active: true

complexity:
  active: true
  ComplexMethod:
    active: true
    threshold: 15
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 8
  TooManyFunctions:
    active: true
    thresholdInFiles: 15
    thresholdInClasses: 20
    thresholdInInterfaces: 10

style:
  active: true
  MaxLineLength:
    active: true
    maxLineLength: 140
  MagicNumber:
    active: false
  UnusedImports:
    active: true
    autoCorrect: true
  WildcardImport:
    active: true
    excludeImports:
      - 'java.util.*'
      - 'kotlinx.android.synthetic.*'

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '([a-z][a-zA-Z0-9]*|(`.*`))'
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
